name: QA Hygiene

on:
  pull_request:
  push:
    branches:
      - main
      - staging
      - development

jobs:
  qa-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run QA Hygiene Gate
        run: npm run -s qa:hygiene
