name: governance-secrets-gate

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Block nested agent folders
        run: |
          ! find . -type d \( -name .serena -o -name .claude -o -name .codex \) | grep -q .

      - name: Secret filename gate
        run: |
          files=$(git ls-files | rg -n '(^|/)(\.env$|\.env\.(local|production|staging|dev)|.*(secret|credential|private[-_]?key|service[-_]?account).*(json|ya?ml|txt|pem|key)$|.*\.(pem|p12|pfx|key)$|secrets/.+\.(json|ya?ml|txt))' -S || true)
          filtered=$(echo "$files" | rg -v '\.env\.example$|\.env\.local\.example$|\.example\.|secrets/README\.md$|\.github/workflows/governance-secrets-gate\.yml$' || true)
          if [ -n "${filtered// }" ]; then
            echo "Secret-like tracked files detected"
            echo "$filtered"
            exit 1
          fi

      - name: Required docs gate
        run: |
          test -f README.md
          test -f CLAUDE.md

      - name: Managed baseline marker required
        run: test -f QUALITY_BASELINE.md
